services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pizza_prod_db}
      POSTGRES_USER: ${POSTGRES_USER:-pizza_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizza_secure_pass}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pizza_admin} -d ${POSTGRES_DB:-pizza_prod_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pizza_admin:pizza_secure_pass@db:5432/pizza_prod_db}
      POSTGRES_DB: ${POSTGRES_DB:-pizza_prod_db}
      POSTGRES_USER: ${POSTGRES_USER:-pizza_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizza_secure_pass}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_prod_data:

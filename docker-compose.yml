services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pizza_db}
      POSTGRES_USER: ${POSTGRES_USER:-pizza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizza}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pizza} -d ${POSTGRES_DB:-pizza_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pizza:pizza@db:5432/pizza_db}
      POSTGRES_DB: ${POSTGRES_DB:-pizza_db}
      POSTGRES_USER: ${POSTGRES_USER:-pizza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizza}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
